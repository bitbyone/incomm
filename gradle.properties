# Plugin coordinates
pluginGroup=dev.incomm
pluginName=incomm
pluginVersion=0.1.0

# IntelliJ Platform to build/run against.
# IC = IntelliJ IDEA Community. Platform-generic APIs keep the plugin usable
# in all JetBrains IDEs (WebStorm, PyCharm, GoLand, ...).
platformType=IC
platformVersion=2024.2.5

# since-build 242 == 2024.2. untilBuild is left open for forward compatibility.
pluginSinceBuild=242

# Gradle
org.gradle.caching=true
org.gradle.configuration-cache=false
org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC

# Kotlin stdlib is provided by the IntelliJ Platform; don't add it again.
kotlin.stdlib.default.dependency=false
