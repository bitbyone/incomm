# incomm i18n bundle
name.incomm=incomm

action.incomm.AddComment.text=Incomm: Add Comment
action.incomm.AddComment.description=Add an inline incomm comment to the current line or selection
action.incomm.Reply.text=Incomm: Reply to Comment
action.incomm.Reply.description=Post a quick reply to the comment on the current line
action.incomm.EditComment.text=Incomm: Edit Comment
action.incomm.EditComment.description=Edit the comment on the current line in place
action.incomm.ResolveThread.text=Incomm: Resolve/Reopen Comment
action.incomm.ResolveThread.description=Resolve or reopen the comment on the current line (resolving also hides its card)
action.incomm.ToggleThread.text=Incomm: Hide/Show Comment
action.incomm.ToggleThread.description=Hide or show the inline card of the comment on the current line
action.incomm.DeleteThread.text=Incomm: Delete Thread
action.incomm.DeleteThread.description=Delete the whole comment and its replies on the current line (no confirmation)
action.incomm.ToggleNotes.text=Incomm: Hide/Show Notes
action.incomm.ToggleNotes.description=Toggle the inline comment cards in the editor (gutter icons stay)
action.incomm.ToggleResolved.text=Incomm: Hide/Show Resolved
action.incomm.ToggleResolved.description=Toggle the inline cards of resolved comments only (gutter icons stay)
action.incomm.Clear.text=Incomm: Clear All Comments
action.incomm.Clear.description=Delete all incomm comments (removes .incomm/notes.json)
action.incomm.ClearFile.text=Incomm: Clear Comments in File
action.incomm.ClearFile.description=Delete all incomm comments for the current file only
action.incomm.ShowComments.text=Incomm: Show Comments
action.incomm.ShowComments.description=Open the incomm comments explorer
